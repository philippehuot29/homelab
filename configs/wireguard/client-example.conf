# WireGuard Client Configuration Template
# Copy and fill in your keys/endpoint

[Interface]
Address = 10.0.0.X/24
PrivateKey = REDACTED
DNS = 10.0.0.1

[Peer]
PublicKey = REDACTED
Endpoint = your-subdomain.duckdns.org:51820
AllowedIPs = 10.0.0.0/24, 192.168.178.0/24
PersistentKeepalive = 25

# AllowedIPs explanation:
# 10.0.0.0/24  — WireGuard tunnel subnet
# 192.168.178.0/24 — Home LAN (reach OPNsense at .72, Pi-hole at .64)
# Use 0.0.0.0/0 to route ALL traffic through tunnel (full VPN mode)
