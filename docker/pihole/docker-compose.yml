# Pi-hole — Network-wide DNS resolver and ad blocker
# Deployed in host networking mode (required for port 53 access)
# Stage 2 — homelab

services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    network_mode: host
    environment:
      TZ: 'Europe/Zagreb'
      WEBPASSWORD: 'REDACTED'
      PIHOLE_DNS_1: '208.67.222.222'
      PIHOLE_DNS_2: '208.67.220.220'
    volumes:
      - '/mnt/storage/pihole/etc-pihole:/etc/pihole'
      - '/mnt/storage/pihole/etc-dnsmasq.d:/etc/dnsmasq.d'
    restart: unless-stopped

# Usage:
#   docker compose up -d      # start
#   docker compose down       # stop
#   docker compose logs -f    # follow logs
#
# Web UI: http://192.168.8.64/admin
# DNS: 192.168.178.64:53
#
# Pre-requisites:
#   - systemd-resolved disabled
#   - /etc/resolv.conf immutable (chattr +i)
#   - /etc/docker/daemon.json: {"iptables": false}
